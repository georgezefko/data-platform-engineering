apiVersion: batch/v1
kind: Job
metadata:
  name: register-debezium-connector
  namespace: develop
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      initContainers:
        - name: wait-for-connect
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              until curl -sf http://kafka-connect-svc.develop.svc.cluster.local:8083/connectors; do
                echo "Waiting for Kafka Connect to be ready..."; sleep 5
              done
              echo "Kafka Connect is ready."
      containers:
        - name: register-connector
          image: curlimages/curl:8.7.1
          command:
            - sh
            - -c
            - |
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                http://kafka-connect-svc.develop.svc.cluster.local:8083/connectors/postgres-connector)
              if [ "$STATUS" = "404" ]; then
                echo "Registering postgres-connector..."
                curl -X POST \
                  http://kafka-connect-svc.develop.svc.cluster.local:8083/connectors \
                  -H "Content-Type: application/json" \
                  -d @/config/connector.json
                echo "Connector registered."
              else
                echo "Connector already exists (HTTP $STATUS), skipping registration."
              fi
          volumeMounts:
            - name: connector-config
              mountPath: /config
      volumes:
        - name: connector-config
          configMap:
            name: debezium-connector-config
      restartPolicy: OnFailure
